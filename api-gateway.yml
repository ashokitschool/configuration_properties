server:
  port: 3333

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            - id: products-api
              uri: lb://products-api
              predicates:
                - Path=/api/products/**

            - id: user-api
              uri: lb://user-api
              predicates:
                - Path=/api/user/**

            - id: orders-api
              uri: lb://orders-api
              predicates:
                - Path=/api/order/**

            - id: notifications-api
              uri: lb://notifications-api
              predicates:
                - Path=/api/notifications/**

            - id: admin-api
              uri: lb://admin-api
              predicates:
                - Path=/api/admin/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true


jwt:
  secret: VGhpc0lzQVNlY3VyZUp3dFNlY3JldEtleUZvckFzaG9rSVRBcHBsaWNhdGlvbjIwMjY=
  expiration: 86400000    
