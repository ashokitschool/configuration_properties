server:
  port: 3333

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # Public route
            - id: products-api
              uri: lb://products-api
              predicates:
                - Path=/api/products/**

            # Public route
            # Login and registration APIs are generally available here
            - id: user-api
              uri: lb://user-api
              predicates:
                - Path=/api/user/**

            # Protected route
            - id: orders-api
              uri: lb://orders-api
              predicates:
                - Path=/api/order/**
              filters:
                - JwtAuthFilter

            # Protected route
            - id: notifications-api
              uri: lb://notifications-api
              predicates:
                - Path=/api/notifications/**
              filters:
                - JwtAuthFilter

            # Protected route
            - id: admin-api
              uri: lb://admin-api
              predicates:
                - Path=/api/admin/**
              filters:
                - JwtAuthFilter

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUp3dFNlY3JldEtleUZvckFzaG9rSVRBcHBsaWNhdGlvbjIwMjY=}
  expiration: 86400000
